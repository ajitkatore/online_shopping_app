version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myapp/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /myapp/docker-credentials/password
    DOCKER_REGISTRY_URL: /myapp/docker-registry/url

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Node version check"
      - node --version

  pre_build:
    commands:
      - echo "Logging in to Docker Hub..."
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin
      - echo "Login successful"

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Building Docker image..."
      - docker build -t "$DOCKER_REGISTRY_USERNAME/tws-online-shop-app-demo:latest" .
      - echo "Docker image built successfully"

  post_build:
    commands:
      - echo "Pushing Docker image..."
      - docker push "$DOCKER_REGISTRY_USERNAME/tws-online-shop-app-demo:latest"
      - echo "Push successful"
      - echo "Uploading zip to S3..."
      - zip -r online-shop-app.zip . --exclude "node_modules/*" --exclude ".git/*"
      - aws s3 cp online-shop-app.zip s3://tws-online-shop-demo/online-shop-app/
      - echo "Writing image definitions..."
      - printf '{"ImageURI":"%s","Port":8000}' "$DOCKER_REGISTRY_USERNAME/tws-online-shop-app-demo:latest" > imageDefinitions.json
      - cat imageDefinitions.json

artifacts:
  files:
    - '**/*'
  base-directory: '.'
  discard-paths: no
  exclude-patterns:
    - 'node_modules/**/*'
    - '.git/**/*'
    - '.gitignore'
    - 'README.md'
    - 'package-lock.json'
