version: 0.2

env:
  parameter-store:
    DOCKER_REGISTRY_USERNAME: /myapp/docker-credentials/username
    DOCKER_REGISTRY_PASSWORD: /myapp/docker-credentials/password
    DOCKER_REGISTRY_URL: /myapp/docker-registry/url

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - node --version
      - npm --version

  pre_build:
    commands:
      - echo "Logging in to Docker Hub..."
      - echo "$DOCKER_REGISTRY_PASSWORD" | docker login -u "$DOCKER_REGISTRY_USERNAME" --password-stdin
      - export IMAGE_REPO_NAME="tws-online-shop-app-demo"
      - export IMAGE_NAME="$DOCKER_REGISTRY_USERNAME/$IMAGE_REPO_NAME"
      - echo "Image name will be -> $IMAGE_NAME"

  build:
    commands:
      - echo "Build started on $(date)"
      - echo "Packaging application into zip..."
      - zip -r online-shop-app.zip . --exclude "node_modules/*" --exclude ".git/*"
      - echo "Building Docker image..."
      - docker build -t $IMAGE_NAME:latest .
      - echo "Docker image built successfully"

  post_build:
    commands:
      - echo "Build completed on $(date)"
      - echo "Pushing Docker image to Docker Hub..."
      - docker push $IMAGE_NAME:latest
      - echo "Docker push successful"
      - echo "Uploading zip to S3..."
      - aws s3 cp online-shop-app.zip s3://tws-online-shop-demo/online-shop-app/
      - echo "S3 upload successful"
      - echo "Writing image definitions file..."
      - printf '{"ImageURI":"%s","Port":8000}' "$IMAGE_NAME:latest" > imageDefinitions.json
      - cat imageDefinitions.json

artifacts:
  files:
    - '**/*'
  base-directory: '.'
  discard-paths: no
  exclude-patterns:
    - 'node_modules/**/*'
    - '.git/**/*'
    - '.gitignore'
    - 'README.md'
    - 'package-lock.json'
